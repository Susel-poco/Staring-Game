<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра Гляделки</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>
    
    <div id="game-container">
        <button id="skins-btn" class="top-btn left-btn">👕 Скины</button>
        <button id="leaderboard-btn" class="top-btn right-btn">🏆 Рейтинг</button>
        <h1>Не моргай! 👁️</h1>
        
        <div id="camera-wrap">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="output"></canvas>
            <div id="fps-box">FPS: <span id="fps-counter">0</span></div>
        </div>

        <div id="info">
            <p id="timer">Время: 0.00 сек</p>
        </div>
        <p style="color: yellow; font-size: 12px;">Коэффициент глаз: <span id="debug-ear">0.00</span></p>
        <button id="action-btn">Начать игру</button>
    </div>

    <div id="result-screen" class="hidden">
        <div class="result-content">
            
            <h1 id="result-title">ИГРА ОКОНЧЕНА</h1>
        
            <div class="score-box">
                <p>Твой результат:</p>
                <span id="final-score">0.00</span> сек
            </div>

            <div id="duel-result-info" style="display: none;">
                <p class="vs">VS</p>
                <p>Рекорд соперника:</p>
                <span id="opponent-score">0.00</span> сек
            </div>

            <button id="submit-btn">Закрыть</button>
        </div>
    </div>

    <div id="skins-menu" class="overlay hidden">
        <div class="menu-content skin-selector-box">
            <h2>Выберите скин для глаз</h2>
            <div class="skins-grid">
                <button class="skin-option active" data-skin="default">
                    <div class="skin-preview default-preview"></div>
                    <span>Обычные</span>
                </button>

                <button class="skin-option" data-skin="kazakhstan">
                    <img src="kazakhstan.png" class="skin-preview">
                    <span>Казахстан</span>
                </button>

                <button class="skin-option" data-skin="sharingan">
                    <img src="sharingan.jpg" class="skin-preview">
                    <span>Шаринган</span>
                </button>

                <button class="skin-option" data-skin="russia">
                    <img src="russia.jpg" class="skin-preview">
                    <span>Россия</span>
                </button>

                <button class="skin-option" data-skin="rinnegan">
                    <img src="rinnegan.jpg" class="skin-preview">
                    <span>Риннеган</span>
                </button>
                <button class="skin-option" data-skin="kyrgyzstan">
                    <img src="kyrgyzstan.jpeg" class="skin-preview">
                    <span>Кыргызстан</span>
                </button>
            </div>
            <button id="close-skins-btn" class="close-btn">Закрыть</button>
        </div>
    </div>
    <div id="leaderboard-menu" class="overlay hidden">
        <div class="menu-content leaderboard-box">
            <h2>🏆 Топ Гляделок</h2>
            <div class="leaderboard-header">
                <span>#</span>
                <span style="text-align: left;">Игрок</span>
                <span>Время</span>
            </div>
            <div id="leaderboard-list">
                </div>
            <button id="close-leaderboard-btn" class="close-btn">Закрыть</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
